<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07080d"/>
<title>FaultMap Pro — Technician Diagnostic Atlas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07080d;--bg2:#0b0d14;--panel:#0f1219;--panel2:#151920;--line:#1c2030;
  --ink:#eaecf5;--ink2:#a8b0c5;--ink3:#626b85;
  --a:#5ee8ff;--b:#b388ff;--w:#ffb347;--g:#4ef0a0;--r:#ff5f7e;
  --grad:linear-gradient(135deg,#5ee8ff,#b388ff 55%,#ff80c0);
  --glow:0 0 32px rgba(94,232,255,.15);
  --mono:'Courier New',Courier,monospace;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;
  background:radial-gradient(ellipse 120% 50% at 90% -5%,rgba(179,136,255,.08) 0%,transparent 55%),
             radial-gradient(ellipse 80% 40% at 5% 105%,rgba(94,232,255,.06) 0%,transparent 50%),
             var(--bg)}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input{font-family:inherit;color:inherit}
::selection{background:rgba(94,232,255,.2)}
a{color:var(--a);text-decoration:none}

/* ── TOP BAR ── */
.bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--line);background:rgba(7,8,13,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:20}
.bar-logo{width:32px;height:32px;border-radius:9px;background:var(--grad);
  display:grid;place-items:center;box-shadow:var(--glow);flex-shrink:0}
.bar-logo svg{width:16px;height:16px;color:#07080d}
.bar-brand{display:flex;flex-direction:column;line-height:1.2}
.bar-brand strong{font-size:14px;font-weight:700;letter-spacing:.1px}
.bar-brand span{font-size:10px;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase}
.bar-space{flex:1}
.bar-badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;
  border:1px solid var(--line);border-radius:99px;color:var(--ink2);background:var(--panel)}
.bar-badge i{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g)}
.bar-menu{display:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);place-items:center;color:var(--ink2)}
.bar-menu svg{width:15px;height:15px}
@media(max-width:860px){.bar-menu{display:grid}}

/* ── SHELL ── */
.shell{flex:1;display:grid;grid-template-columns:272px 1fr;min-height:0}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{display:none;position:fixed;inset:58px 0 0 0;z-index:50;background:var(--bg);width:min(300px,100%)}
  .side.open{display:flex}
}

/* ── SIDEBAR ── */
.side{border-right:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column;min-height:0}
.side-search{padding:12px 10px 6px;position:relative}
.side-search input{width:100%;height:38px;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;padding:0 10px 0 36px;color:var(--ink);font-size:13px;outline:none;transition:.15s}
.side-search input:focus{border-color:#2b3454;box-shadow:0 0 0 2px rgba(94,232,255,.09)}
.side-search svg{position:absolute;left:22px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--ink3);pointer-events:none}
.side-nav{flex:1;overflow-y:auto;padding:2px 7px 20px;scrollbar-width:thin;scrollbar-color:#1c2030 transparent}
.side-nav::-webkit-scrollbar{width:3px}
.side-nav::-webkit-scrollbar-thumb{background:#1c2030;border-radius:2px}
.nav-head{font-size:9.5px;text-transform:uppercase;letter-spacing:2px;color:var(--ink3);
  padding:14px 9px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;
  cursor:pointer;transition:.1s;color:var(--ink3);font-size:13px;
  border:1px solid transparent;margin-bottom:1px}
.nav-item:hover{background:var(--panel);color:var(--ink2)}
.nav-item.on{background:rgba(94,232,255,.08);color:var(--ink);border-color:rgba(94,232,255,.18)}
.nav-ico{width:24px;height:24px;border-radius:6px;background:var(--panel);
  display:grid;place-items:center;flex-shrink:0;color:var(--ink3)}
.nav-item.on .nav-ico{background:var(--grad);color:#07080d}
.nav-ico svg{width:12px;height:12px}
.nav-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px}

/* ── MAIN ── */
.main{overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:#1c2030 transparent}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#1c2030;border-radius:3px}

/* ── HERO ── */
.hero{padding:22px 28px 16px;border-bottom:1px solid var(--line);
  background:radial-gradient(600px 200px at 20% 50%,rgba(94,232,255,.05),transparent 60%)}
.hero-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.hero-ico{width:50px;height:50px;border-radius:14px;background:var(--grad);
  display:grid;place-items:center;box-shadow:var(--glow);flex-shrink:0}
.hero-ico svg{width:22px;height:22px;color:#07080d}
.hero-cat{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--a);font-weight:700;margin-bottom:3px}
.hero-title{font-size:22px;font-weight:700;letter-spacing:-.3px;line-height:1.15;
  background:linear-gradient(170deg,#fff 20%,#8a95b0);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{font-size:13px;color:var(--ink2);margin-top:5px;max-width:600px}
.hero-pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 9px;
  border:1px solid var(--line);border-radius:99px;color:var(--ink2);background:var(--panel)}
.pill svg{width:10px;height:10px;color:var(--a)}
.pill b{color:var(--ink);font-weight:600}
@media(max-width:560px){.hero{padding:16px 14px 12px}.hero-title{font-size:18px}}

/* ── CONTENT ── */
.content{padding:20px 28px 56px}
@media(max-width:560px){.content{padding:14px 14px 48px}}
.sec{margin-bottom:24px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-line{width:2.5px;height:13px;background:var(--grad);border-radius:2px;flex-shrink:0}
.sec-title{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;font-weight:700;color:var(--ink)}
.sec-ct{font-size:10.5px;color:var(--ink3);margin-left:auto}

/* ── INTERACTIVE MAP ── */
.map-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;padding:14px 0 8px}
.map-scroll{overflow-x:auto;padding:0 14px 10px;scrollbar-width:thin;scrollbar-color:#1c2030 transparent}
.map-scroll::-webkit-scrollbar{height:3px}
.map-scroll::-webkit-scrollbar-thumb{background:#1c2030;border-radius:2px}
.map-svg{display:block;overflow:visible}
/* step node in map */
.mn rect{rx:7;ry:7;transition:.3s}
.mn text{font-family:var(--mono);font-size:9px;dominant-baseline:middle;text-anchor:middle;pointer-events:none}
.mn .mn-num{font-size:8px;fill:var(--ink3)}
.mn.type-check rect{fill:#0d1420;stroke:#1c3060;stroke-width:1.5}
.mn.type-check.active rect{fill:#0e1e3a;stroke:var(--a);stroke-width:2;filter:drop-shadow(0 0 6px rgba(94,232,255,.4))}
.mn.type-check.done-pass rect{fill:#0b1e15;stroke:var(--g);stroke-width:1.5}
.mn.type-check.done-fail rect{fill:#1e0b10;stroke:var(--r);stroke-width:1.5}
.mn.type-test rect{fill:#1a1200;stroke:#3a2800;stroke-width:1.5}
.mn.type-test.active rect{fill:#221800;stroke:var(--w);stroke-width:2;filter:drop-shadow(0 0 6px rgba(255,179,71,.35))}
.mn.type-test.done-pass rect{fill:#0b1e15;stroke:var(--g);stroke-width:1.5}
.mn.type-test.done-fail rect{fill:#1e0b10;stroke:var(--r);stroke-width:1.5}
.mn.type-fix rect{fill:#130e20;stroke:#2a1e48;stroke-width:1.5}
.mn.type-fix.active rect{fill:#180f28;stroke:var(--b);stroke-width:2;filter:drop-shadow(0 0 6px rgba(179,136,255,.35))}
.mn.type-danger rect{fill:#1a0606;stroke:#4a0f0f;stroke-width:1.5}
.mn.type-danger.active rect{fill:#220808;stroke:var(--r);stroke-width:2}
.mn.type-check text,.mn.type-test text,.mn.type-fix text,.mn.type-danger text{fill:var(--ink2)}
.mn.active text{fill:var(--ink)}
.mn.done-pass text{fill:var(--g)}
.mn.done-fail text{fill:var(--r)}
/* connector paths */
.mc{fill:none;stroke-width:1.5;opacity:.5;transition:.3s}
.mc.active{opacity:1;stroke-width:2}
.mc.pass-path{stroke:var(--g)}
.mc.fail-path{stroke:var(--r)}
.mc.normal{stroke:#2a3050}
/* outcome indicator dot */
.mn .mn-badge{transition:.3s;opacity:0}
.mn.done-pass .mn-badge,.mn.done-fail .mn-badge{opacity:1}

/* ── STEP CARDS ── */
.steps{display:flex;flex-direction:column;gap:8px}
.step{border-radius:11px;overflow:hidden;border:1px solid var(--line);transition:.15s;cursor:pointer}
.step.active{border-color:rgba(94,232,255,.25);box-shadow:0 0 0 3px rgba(94,232,255,.06)}
.step-head{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--panel);user-select:none}
.step-num{font-family:var(--mono);font-size:9.5px;color:var(--ink3);letter-spacing:.5px;flex-shrink:0}
.step-badge{font-size:9.5px;padding:2px 6px;border-radius:4px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);flex-shrink:0}
.sb-check{background:rgba(94,232,255,.1);color:var(--a)}
.sb-test{background:rgba(255,179,71,.1);color:var(--w)}
.sb-fix{background:rgba(179,136,255,.12);color:var(--b)}
.sb-danger{background:rgba(255,95,126,.1);color:var(--r)}
.step-title{font-size:13.5px;font-weight:650;color:var(--ink);flex:1;min-width:0}
.step-outcome{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700;flex-shrink:0}
.outcome-pass{background:rgba(78,240,160,.15);color:var(--g)}
.outcome-fail{background:rgba(255,95,126,.15);color:var(--r)}
.step-chevron{color:var(--ink3);flex-shrink:0;transition:.2s}
.step-chevron svg{width:13px;height:13px}
.step.open .step-chevron{transform:rotate(180deg)}

.step-body{display:none;padding:0 13px 14px;background:var(--panel)}
.step.open .step-body{display:block}
.step-desc{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:10px}

/* measurements */
.meas-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mv{font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:5px;
  border:1px solid var(--line);background:var(--bg2);display:inline-flex;align-items:center;gap:5px}
.mv-label{color:var(--ink3)}
.mv-val{font-weight:700}
.mv.ok .mv-val{color:var(--g)}
.mv.warn .mv-val{color:var(--w)}
.mv.bad .mv-val{color:var(--r)}
.mv.info .mv-val{color:var(--a)}

/* pass/fail section */
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
@media(max-width:500px){.pf-grid{grid-template-columns:1fr}}
.pf-box{border-radius:8px;padding:9px 11px}
.pf-box.ok{background:rgba(78,240,160,.05);border:1px solid rgba(78,240,160,.18)}
.pf-box.bad{background:rgba(255,95,126,.05);border:1px solid rgba(255,95,126,.18)}
.pf-hd{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.pf-box.ok .pf-hd{color:var(--g)}
.pf-box.bad .pf-hd{color:var(--r)}
.pf-txt{font-size:12px;color:var(--ink2);line-height:1.6}

/* action items */
.acts{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.act{display:flex;gap:7px;font-size:12.5px;padding:7px 9px;
  background:var(--bg2);border:1px solid var(--line);border-radius:7px;line-height:1.5;align-items:flex-start}
.act-ico{width:16px;height:16px;border-radius:4px;background:var(--panel2);
  display:grid;place-items:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.act.ok .act-ico{color:var(--g)}
.act.warn .act-ico{color:var(--w)}
.act.bad .act-ico{color:var(--r)}
.act-txt{color:var(--ink2)}

/* PASS/FAIL buttons */
.pf-btns{display:flex;gap:8px;margin-top:12px}
.btn-pass,.btn-fail,.btn-skip{padding:8px 18px;border-radius:8px;font-size:12.5px;font-weight:700;
  letter-spacing:.3px;transition:.15s;border:1px solid}
.btn-pass{background:rgba(78,240,160,.12);border-color:rgba(78,240,160,.3);color:var(--g)}
.btn-pass:hover{background:rgba(78,240,160,.2)}
.btn-fail{background:rgba(255,95,126,.1);border-color:rgba(255,95,126,.28);color:var(--r)}
.btn-fail:hover{background:rgba(255,95,126,.18)}
.btn-skip{background:var(--bg2);border-color:var(--line);color:var(--ink3);font-size:12px;padding:8px 14px}
.btn-skip:hover{color:var(--ink2)}

/* lines table */
.lines-tbl{width:100%;border-collapse:collapse}
.lines-tbl tr{border-bottom:1px solid var(--line)}
.lines-tbl tr:last-child{border:0}
.lines-tbl td{padding:7px 9px;font-size:12px;vertical-align:top}
.lines-tbl .td-net{font-family:var(--mono);color:var(--a);font-weight:700;white-space:nowrap;font-size:11px}
.lines-tbl .td-dir{color:var(--ink3);white-space:nowrap;font-size:11px}
.lines-tbl .td-nom{color:var(--ink);font-weight:600}
.lines-tbl .td-note{color:var(--ink2)}
.lines-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}

/* ICs */
.ic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.ic-card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
.ic-name{font-family:var(--mono);font-size:11.5px;color:var(--a);font-weight:700;margin-bottom:2px}
.ic-aka{font-size:10.5px;color:var(--ink3);margin-bottom:6px}
.ic-desc{font-size:12px;color:var(--ink2);line-height:1.55}

/* verify */
.verify{background:rgba(78,240,160,.05);border:1px solid rgba(78,240,160,.18);
  border-radius:10px;padding:13px 15px}
.verify-hd{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--g);
  font-weight:700;margin-bottom:8px}
.verify-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.verify-list li{display:flex;gap:8px;font-size:12.5px;color:var(--ink2);align-items:flex-start}
.verify-list li::before{content:"✓";color:var(--g);font-weight:700;flex-shrink:0;font-size:11px;margin-top:2px}

/* mistakes */
.mistakes{display:flex;flex-direction:column;gap:6px}
.mistake{display:flex;gap:10px;padding:10px 12px;background:var(--panel);
  border:1px solid rgba(255,95,126,.12);border-radius:9px;align-items:flex-start}
.mistake-e{font-size:18px;flex-shrink:0;line-height:1}
.mistake-t{font-size:13px;font-weight:650;color:var(--ink);margin-bottom:2px}
.mistake-d{font-size:12px;color:var(--ink2);line-height:1.55}

/* summary block */
.summary{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:14px 16px;font-size:13.5px;color:var(--ink2);line-height:1.7}

/* tools */
.tools-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tools-row::-webkit-scrollbar{display:none}
.tool{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 11px;
  background:var(--panel);border:1px solid var(--line);border-radius:9px}
.tool-ico{width:26px;height:26px;border-radius:6px;background:var(--panel2);
  display:grid;place-items:center;color:var(--a);flex-shrink:0}
.tool-ico svg{width:12px;height:12px}
.tool-n{font-size:12px;font-weight:600;color:var(--ink)}
.tool-s{font-size:10.5px;color:var(--ink3)}

/* progress bar */
.progress-bar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--grad);border-radius:2px;transition:.4s}

/* home */
.home{padding:32px 28px}
@media(max-width:560px){.home{padding:22px 14px}}
.home-hi{font-size:10px;letter-spacing:2px;color:var(--a);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.home-h{font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1.1;margin-bottom:10px;
  background:linear-gradient(170deg,#fff 25%,#8090b0);-webkit-background-clip:text;background-clip:text;color:transparent}
.home-lede{font-size:14.5px;color:var(--ink2);max-width:560px;margin-bottom:22px;line-height:1.65}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:24px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:12px}
.stat-n{font-size:22px;font-weight:700;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stat-l{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.quick{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.qbtn{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:13px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:7px;
  transition:.13s;min-height:110px}
.qbtn:hover{border-color:rgba(94,232,255,.25);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.qbtn-ico{width:30px;height:30px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;color:var(--a)}
.qbtn:hover .qbtn-ico{background:var(--grad);color:#07080d}
.qbtn-ico svg{width:14px;height:14px}
.qbtn-t{font-size:12.5px;font-weight:650;color:var(--ink);line-height:1.3}
.qbtn-d{font-size:11px;color:var(--ink3);margin-top:auto;line-height:1.4}

/* footer */
.footer{padding:14px 28px;border-top:1px solid var(--line);font-size:11px;color:var(--ink3);
  display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;flex-shrink:0}

/* backdrop */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;backdrop-filter:blur(3px)}
.backdrop.on{display:block}

/* anim */
.fade{animation:fadeIn .28s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <button class="bar-menu" id="menuBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="bar-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L4 7V13C4 17.5 7.5 20.5 12 22C16.5 20.5 20 17.5 20 13V7Z"/>
      <polyline points="9,12 11,14 15,10"/>
    </svg>
  </div>
  <div class="bar-brand"><strong>FaultMap Pro</strong><span>Diagnostic Atlas · v5.1</span></div>
  <div class="bar-space"></div>
  <div class="bar-badge"><i></i> Offline Ready</div>
</div>

<div class="backdrop" id="bdrop"></div>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="side-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="srch" placeholder="Search fault, IC, signal…" autocomplete="off"/>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea"></main>
</div>

/* 3 ─── NO DISPLAY ────────────────────────────────────────────── */
{id:'no-display', cat:'Display', icon:'display',

 tools:['dmm','scope','micro','station','psu'],
 lines:[

 ],
 ics:[

   {name:'Display DC-DC (AMOLED)', aka:'S2DOS05 / MAX77705D / DW8768', desc:'Generates AVDD, ELVDD, ELVSS from VBAT. On FPC or main board. After drop, output caps crack pulling rails down.'},

 ],

/* 4 ─── TOUCHSCREEN ───────────────────────────────────────────── */
{id:'no-touch', cat:'Display', icon:'touch',
 title:'Touch Dead or Erratic',
 sub:'Display shows image but touch has no response, zones dead, or ghost inputs',
 summary:'Touch controller (I2C or SPI) scans an ITO/metal-mesh grid. Must have AVDD + VIO, a valid RST pulse, and I2C ACK before SoC driver registers input. Ghost touches come from liquid contamination, ITO cracks with floating nodes, or failed controller leakage.',
 tools:['dmm','scope','micro','station'],
 lines:[
   {net:'TP_VDD / AVDD', dir:'Supply', nom:'3.0–3.3 V', note:'Touch controller analog supply. Missing = controller dead before it starts.'},
   {net:'TP_VIO / IOVDD', dir:'Supply', nom:'1.8 V', note:'Digital IO supply for SDA/SCL level compatibility with SoC.'},
   {net:'TP_RST', dir:'Logic', nom:'Pulse low 10 ms then 1.8 V', note:'SoC resets controller at boot. Stuck low = controller in permanent reset.'},
   {net:'TP_INT', dir:'Logic out', nom:'Active low pulse on touch detect', note:'Interrupt to SoC. Stuck low = data ready line shorted.'},
   {net:'TP_SDA / TP_SCL', dir:'I2C', nom:'SCL 400 kHz; SDA ACK = pulled low', note:'Flat-line SDA with SCL running = controller not ACK-ing.'},
 ],
 ics:[
   {name:'Touch Controller', aka:'Synaptics S3706 / TD4150 / Goodix GT9886 / FocalTech FT5436', desc:'Scans ITO grid rows and columns at 120–240 Hz. After drop damage, BGA balls crack. After liquid, internal IO leaks. Firmware version must match panel config on multi-vendor boards.'},
   {name:'ITO / Metal-mesh digitizer', aka:'Bonded to display glass', desc:'Optically clear conductive traces. Hairline glass cracks break ITO. Dead zone correlates exactly with crack position. Not repairable — replace panel.'},
 ],
 steps:[
   {k:'check', title:'Classify touch failure',
    acts:[
      {t:'"Completely dead" → power, reset, or I2C bus fault', w:'warn'},

      {t:'"Works sometimes / needs firm press" → cracked FPC or intermittent I2C', w:'warn'},
      {t:'"Wrong coordinate mapping" → firmware ID mismatch, not hardware', w:'ok'},
    ]},
   {k:'check', title:'Reseat touch FPC',
    desc:'On Samsung, Xiaomi, Oppo — touch may have its own FPC separate from display. Power off, unlock ZIF, clean with IPA, reseat firmly.',
    pf:{
      ok:{h:'Reseat fixes it → loose FPC', b:'Reinforce with foam spacer. Inspect why it came loose.'},
      bad:{h:'Still dead → proceed to power measurement', b:'FPC not the cause.'},
    }},
   {k:'test', title:'Measure TP_VDD (3.3 V) and TP_VIO (1.8 V)',
    desc:'Phone on. Probe supply pins at touch controller or nearest decoupling cap.',
    meas:[
      {l:'TP_VDD', v:'3.0–3.3 V', s:'ok'},
      {l:'TP_VIO', v:'1.8 V ±0.1', s:'ok'},

   {k:'test', title:'Scope TP_RST pulse at boot',
    desc:'Scope RST pin during power-on. 50 ms/div, trigger rising edge.',

      {l:'Normal RST', v:'0 V for 10–20 ms, then 1.8 V', s:'ok'},

    pf:{
      ok:{h:'RST pulsed → controller received reset', b:'Reset line working. Move to I2C bus check.'},

/* 5 ─── SHORT CIRCUIT ─────────────────────────────────────────── */
{id:'short', cat:'Power', icon:'short',
 title:'Short Circuit on Power Rail',
 sub:'Board draws excess current, gets hot immediately, or component burns on power-up',
 summary:'Almost always a failed MLCC capacitor (cracked by drop/flex) or IC internal junction failure. Never apply full battery voltage to a shorted board — current vaporizes the part and etches the PCB. Use current-limited DC PSU and thermal detection to localize before removing anything.',
 tools:['psu','dmm','freeze','micro','hotair','station'],
 lines:[
   {net:'Any supply rail', dir:'Supply', nom:'Diode mode: 0.40–0.65 V to GND', note:'Any rail measuring < 0.1 V in diode mode has a hard short. 0.10–0.40 V = soft short or large cap bank.'},
   {net:'VBAT / VPH_PWR', dir:'Primary', nom:'Idle 1–8 mA @ 4 V PSU', note:'Most commonly shorted since every domain branches here.'},
 ],
 ics:[
   {name:'MLCC Capacitors', aka:'0201 / 0402 X5R/X7R everywhere on power rails', desc:'#1 cause of shorts. A cracked X5R cap can measure 0 Ω DC and cause 3 A+ draw. Crack often invisible at 10×; may need 40× oblique lighting or dye penetrant to see.'},
   {name:'PMIC / Charger IC', aka:'Internal junction failure post-ESD or liquid', desc:'PMIC output FET can fail short. Distinguishable from cap: remove all caps on a rail and short remains = IC is the culprit.'},
   {name:'Power Amplifier BST cap', aka:'PA BST capacitor on VPA rail', desc:'100 nF 0201 cap on PA VCC line. Frequently fails after reverse-polarity. Very small; easy to miss.'},
 ],
 steps:[
   {k:'check', title:'Confirm and classify the short',
    desc:'NEVER connect battery to suspected shorted board. Use DC PSU at 4.0 V, current limit 100 mA.',
    meas:[
      {l:'Diode mode on VBAT (board off)', v:'0.40–0.65 V', s:'ok'},
      {l:'Soft short (large cap bank)', v:'0.20–0.40 V', s:'warn'},
      {l:'Hard short', v:'0–0.10 V', s:'bad'},
      {l:'PSU at compliance (4 V, limit 100 mA)', v:'> 50 mA', s:'bad'},
    ],
    pf:{
      ok:{h:'Diode reading normal → no short on this rail', b:'Check other rails. VBAT OK does not mean VDD_CPU or PP1V8 is OK.'},
      bad:{h:'Diode < 0.1 V → hard short confirmed', b:'Proceed to thermal localization. Do NOT apply battery voltage. Note which rail is shorted.'},
    }},
   {k:'check', title:'Localize short with thermal detection',
    desc:'Connect PSU to shorted rail at 1.0 V, current limit 500 mA. Shorted component heats within 10–30 seconds.',
    acts:[
      {t:'METHOD A — IPA mist: spray lightly across area. Frost evaporates first at the hot/shorted part. Works at room temp', w:'ok'},
      {t:'METHOD B — Thermal camera (InfiRay P2 Pro): apply PSU, wait 15 s, examine frame. Shorted part is 5–15 °C above surroundings', w:'ok'},
      {t:'METHOD C — Freeze spray: apply to board area, power on — shorted part frost clears first', w:'ok'},
      {t:'CRITICAL: Narrow to specific component BEFORE removing anything', w:'warn'},
    ]},
   {k:'check', title:'Remove suspect component and retest',
    desc:'Power off PSU completely. Hot-air or fine-tip to remove identified component. Allow 60 s cool. Recheck diode mode.',
    pf:{
      ok:{h:'Short gone after removal → faulty component confirmed', b:'Replace with exact value: VBAT cap = 10 µF 6.3 V X5R 0402 (e.g. Murata GRM155R60J106ME11). VDD_CPU = 4.7 µF 10 V X7R 0402. PP1V8 = 1 µF 10 V X7R 0201.'},
      bad:{h:'Short remains after all caps removed → IC internal short', b:'The IC whose regulator drives this rail has internal MOSFET failure. Reball or replace that IC. For PMIC: specific LDO FET shorted.'},
    }},
   {k:'test', title:'Verify repair — PSU idle current',
    desc:'After replacing component, reconnect PSU at 4.0 V, 500 mA limit.',
    meas:[
      {l:'Idle (before power press)', v:'1–8 mA', s:'ok'},
      {l:'Diode mode after repair', v:'0.40–0.65 V', s:'ok'},
      {l:'Still elevated idle', v:'> 40 mA', s:'bad'},
    ],
    pf:{
      ok:{h:'1–8 mA and diode normal → short resolved', b:'Proceed to full boot test. Monitor temperature for 2 minutes — should not exceed 35 °C.'},
      bad:{h:'Still > 40 mA → additional shorted component', b:'Multiple components may be shorted on same rail. Repeat thermal localization.'},
    }},
   {k:'danger', title:'Critical warnings',
    acts:[
      {t:'NEVER apply battery voltage to find a short — instantaneous PCB erosion, possible fire', w:'bad'},
      {t:'NEVER use freeze spray near an open flame or hot iron — propellant is flammable', w:'bad'},
      {t:'NEVER "power on and see what burns" — destroys traces and adjacent ICs', w:'bad'},
    ]},
 ],
 verify:['Diode-mode on repaired rail: 0.40–0.65 V','PSU idle 1–8 mA at 4.0 V','No component above 35 °C after 2 minutes idle','Full boot completes without PSU current limit tripping','Charge current accepted normally'],
 mistakes:[
   {e:'🔋', t:'Connecting real battery to shorted board', d:'LiPo sources 10–30 A. Shorted cap absorbs this as heat — vaporizes, solder splashes, traces etch. Always PSU with current limit.'},
   {e:'🎯', t:'Removing caps without thermal localization first', d:'Thermal localization pins the faulty cap in 30 seconds. Blind removal damages pads unnecessarily.'},
   {e:'🔄', t:'Wrong replacement cap value', d:'0402 footprint can hold 100 nF, 1 µF, 4.7 µF, or 10 µF. Wrong value causes rail instability. Verify from schematic.'},
 ]},

{id:'network', cat:'Radio', icon:'network',
 title:'No Cellular Signal / No Service',
 sub:'Device shows "No Service", "Searching…", 0 bars, or null IMEI',

{id:'audio', cat:'Audio', icon:'audio',
 title:'Audio Failure — Speaker / Mic / Earpiece',

 tools:['dmm','scope','micro','station'],
 lines:[
   {net:'SPK+ / SPK−', dir:'Drive', nom:'AC 1–4 Vpp differential at normal volume', note:'DC offset > 500 mV = failed output stage. Always check before connecting new speaker.'},

   {net:'MIC1+ / MIC1−', dir:'Signal', nom:'AC 10–50 mVpp during speech', note:'Differential signal into codec ADC.'},
   {net:'I2S_SCK / I2S_WS / I2S_DATA', dir:'Digital audio', nom:'I2S clock 2.048–12.288 MHz', note:'PCM bus from SoC to codec/amp. Flat = SoC audio subsystem not running.'},
   {net:'I2C_AMP_SDA / SCL', dir:'Control', nom:'400 kHz, ACK every byte', note:'SoC configures smart-amp gain, EQ, impedance protection.'},
 ],

   {name:'Audio Codec', aka:'WCD9385 / WCD938x / Realtek ALC5670 / CS43130', desc:'Converts PCM ↔ analog for ALL paths. Failed codec kills speaker, earpiece, and mic simultaneously. Liquid under BGA is common cause.'},

 ],

      {t:'Music via speaker: distorted/buzzing → coil failing or amp DC fault', w:'warn'},
      {t:'ALL audio dead simultaneously → codec or I2S bus', w:'bad'},

{id:'boot', cat:'Boot', icon:'boot',

   {net:'UFS_VCCQ / VCCQ2', dir:'Storage', nom:'1.2 V / 1.8 V', note:'UFS IO voltages. All three UFS rails must be present simultaneously.'},
   {net:'LPDDR_VDD / VDDQ', dir:'RAM', nom:'1.1 V / 0.55 V (LPDDR5)', note:'RAM core and IO. Missing or drooping causes kernel panic at RAM init.'},
 ],

 ],
 steps:[

  hotair:{n:'Hot Air Rework',     s:'Quick 861DW / JBC HT-BGA', i:'hotair'},
  freeze:{n:'Freeze Spray / Thermal', s:'CAIG + InfiRay P2',   i:'freeze'},
  flash: {n:'Firmware Flasher',   s:'QFIL / Odin / iTunes',     i:'flash'},
};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const STATE = {
  cur: null,          // current fault id
  q: '',              // search query
  outcomes: {},       // {faultId: {stepIdx: 'pass'|'fail'|'skip'}}
  openStep: {},       // {faultId: stepIdx} — which step is expanded
};

function getOutcomes(fid) {
  if (!STATE.outcomes[fid]) STATE.outcomes[fid] = {};
  return STATE.outcomes[fid];
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   UTILITIES — DOM builder (no innerHTML injection)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function elH(tag, cls, html) { // safe only for STATIC html strings
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  e.innerHTML = html;
  return e;
}
function app(parent, ...children) {
  children.forEach(c => c && parent.appendChild(c));
  return parent;
}
function $ (id) { return document.getElementById(id); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SIDEBAR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CAT_ORDER = ['Power','Display','Audio','Boot','Radio'];

function buildSidebar() {
  const q = STATE.q.toLowerCase();
  const groups = {};
  for (const f of DB) {
    if (q) {
      const hay = [f.title, f.sub, f.summary,
        ...(f.lines||[]).map(l => l.net+' '+l.note),
        ...(f.ics||[]).map(i => i.name+' '+i.aka+' '+i.desc),
        ...(f.steps||[]).map(s => s.title+' '+(s.desc||'')+' '+
          (s.acts||[]).map(a=>a.t).join(' ')),
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) continue;
    }
    (groups[f.cat] = groups[f.cat] || []).push(f);
  }

  const nav = $('sideNav');
  nav.innerHTML = '';

  // Home item
  const homeItem = el('div', 'nav-item' + (STATE.cur === null ? ' on' : ''));
  const homeIco = elH('span', 'nav-ico', SVG.home);
  homeIco.querySelector('svg').style.cssText = 'width:12px;height:12px';
  app(homeItem, homeIco, el('span', 'nav-lbl', 'Overview'));
  homeItem.addEventListener('click', () => { STATE.cur = null; refresh(); closeSide(); });
  nav.appendChild(homeItem);

  for (const cat of CAT_ORDER) {
    if (!groups[cat]) continue;
    nav.appendChild(el('div', 'nav-head', cat));
    for (const f of groups[cat]) {
      const item = el('div', 'nav-item' + (STATE.cur === f.id ? ' on' : ''));
      const ico = elH('span', 'nav-ico', SVG[f.icon] || SVG.power);
      ico.querySelector('svg').style.cssText = 'width:12px;height:12px';
      const outcomes = getOutcomes(f.id);
      const doneCount = Object.keys(outcomes).length;
      const lbl = el('span', 'nav-lbl', f.title.split('/')[0].split('—')[0].trim());
      app(item, ico, lbl);
      if (doneCount > 0) {
        const badge = el('span', '', doneCount + '/' + f.steps.length);
        badge.style.cssText = 'font-size:10px;color:var(--a);font-family:var(--mono)';
        item.appendChild(badge);
      }
      item.addEventListener('click', () => { STATE.cur = f.id; refresh(); closeSide(); });
      nav.appendChild(item);
    }
  }
  if (q && !Object.keys(groups).length) {
    const none = el('div', '', 'No results for "' + q + '"');
    none.style.cssText = 'padding:20px 12px;font-size:12px;color:var(--ink3)';
    nav.appendChild(none);
  }
}

function closeSide() {
  if (window.innerWidth <= 860) {
    $('side').classList.remove('open');
    $('bdrop').classList.remove('on');
  }
  $('mainArea').scrollTop = 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INTERACTIVE REAL-TIME MAP (SVG flowchart)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const NODE_W = 90, NODE_H = 38, GAP_X = 20, GAP_Y = 14, PAD = 14;

function buildMap(f) {
  const outcomes = getOutcomes(f.id);
  const steps = f.steps;
  const cols = Math.ceil(steps.length / 2);
  const rows = 2;
  const svgW = cols * (NODE_W + GAP_X) - GAP_X + PAD * 2;
  const svgH = rows * (NODE_H + GAP_Y) - GAP_Y + PAD * 2;

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('class', 'map-svg');
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  const COLORS = { check:'#5ee8ff', test:'#ffb347', fix:'#b388ff', danger:'#ff5f7e' };

  steps.forEach((s, i) => {
    const col = i % Math.ceil(steps.length / rows);
    const row = Math.floor(i / Math.ceil(steps.length / rows));
    const x = PAD + col * (NODE_W + GAP_X);
    const y = PAD + row * (NODE_H + GAP_Y);
    const cx = x + NODE_W / 2;
    const cy = y + NODE_H / 2;

    // Connector to next step (if same row)
    if (i + 1 < steps.length && (i + 1) % Math.ceil(steps.length / rows) !== 0) {
      const nx = x + NODE_W + GAP_X;
      const path = document.createElementNS(NS, 'path');
      const outcome = outcomes[i];
      let strokeCol = '#2a3050';
      if (outcome === 'pass') strokeCol = 'var(--g, #4ef0a0)';
      else if (outcome === 'fail') strokeCol = 'var(--r, #ff5f7e)';
      path.setAttribute('d', 'M' + (x + NODE_W) + ',' + cy + ' L' + nx + ',' + cy);
      path.setAttribute('stroke', strokeCol);
      path.setAttribute('stroke-width', outcome ? '2' : '1.2');
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', outcome ? '1' : '0.4');
      svg.appendChild(path);
    }

    // Connector from row 0 col last to row 1 col 0 (wrap)
    const perRow = Math.ceil(steps.length / rows);
    if (i === perRow - 1 && rows === 2 && steps.length > perRow) {
      const nx0 = PAD;
      const ny1 = PAD + NODE_H + GAP_Y + NODE_H / 2;
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d',
        'M' + cx + ',' + (y + NODE_H) +
        ' L' + cx + ',' + (y + NODE_H + GAP_Y / 2) +
        ' L' + nx0 + ',' + (y + NODE_H + GAP_Y / 2) +
        ' L' + nx0 + ',' + ny1);
      path.setAttribute('stroke', '#2a3050');
      path.setAttribute('stroke-width', '1.2');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-dasharray', '3,2');
      path.setAttribute('opacity', '0.4');
      svg.appendChild(path);
    }

    // Node background
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'mn type-' + (s.k === 'danger' ? 'danger' : s.k));
    g.style.cursor = 'pointer';

    const outcome = outcomes[i];
    let fillCol = '#0d1420', strokeCol = '#1c3060';
    if (s.k === 'test') { fillCol = '#1a1200'; strokeCol = '#3a2800'; }
    if (s.k === 'fix') { fillCol = '#130e20'; strokeCol = '#2a1e48'; }
    if (s.k === 'danger') { fillCol = '#1a0606'; strokeCol = '#4a0f0f'; }
    let textFill = '#8090b0';
    if (outcome === 'pass') { fillCol = '#0b1e15'; strokeCol = '#4ef0a0'; textFill = '#4ef0a0'; }
    if (outcome === 'fail') { fillCol = '#1e0b10'; strokeCol = '#ff5f7e'; textFill = '#ff5f7e'; }

    const isActive = !outcome;
    let allPrevDone = i === 0 || Object.keys(outcomes).includes(String(i - 1));

    // Check if this is the current active step
    const currentStep = STATE.openStep[f.id] || 0;
    const isCurrentlyOpen = (currentStep === i);

    if (isCurrentlyOpen && !outcome) {
      strokeCol = COLORS[s.k] || '#5ee8ff';
      textFill = '#fff';
    }

    const rect = document.createElementNS(NS, 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', NODE_W); rect.setAttribute('height', NODE_H);
    rect.setAttribute('rx', '6'); rect.setAttribute('ry', '6');
    rect.setAttribute('fill', fillCol);
    rect.setAttribute('stroke', strokeCol);
    rect.setAttribute('stroke-width', isCurrentlyOpen && !outcome ? '2' : '1.5');

    // Step number
    const numText = document.createElementNS(NS, 'text');
    numText.setAttribute('x', cx);
    numText.setAttribute('y', cy - 7);
    numText.setAttribute('fill', outcome ? textFill : '#4a5570');
    numText.setAttribute('font-size', '8');
    numText.setAttribute('font-family', 'monospace');
    numText.setAttribute('text-anchor', 'middle');
    numText.setAttribute('dominant-baseline', 'middle');
    numText.textContent = 'STEP ' + String(i + 1).padStart(2, '0');

    // Title (truncated)
    const title = s.title.length > 14 ? s.title.slice(0, 13) + '…' : s.title;
    const titleText = document.createElementNS(NS, 'text');
    titleText.setAttribute('x', cx);
    titleText.setAttribute('y', cy + 5);
    titleText.setAttribute('fill', textFill);
    titleText.setAttribute('font-size', '9');
    titleText.setAttribute('font-family', 'monospace');
    titleText.setAttribute('text-anchor', 'middle');
    titleText.setAttribute('dominant-baseline', 'middle');
    titleText.setAttribute('font-weight', isCurrentlyOpen ? '700' : '400');
    titleText.textContent = title;

    // Outcome badge circle
    if (outcome) {
      const circle = document.createElementNS(NS, 'circle');
      circle.setAttribute('cx', x + NODE_W - 6);
      circle.setAttribute('cy', y + 6);
      circle.setAttribute('r', '5');
      circle.setAttribute('fill', outcome === 'pass' ? '#4ef0a0' : '#ff5f7e');
      const badgeText = document.createElementNS(NS, 'text');
      badgeText.setAttribute('x', x + NODE_W - 6);
      badgeText.setAttribute('y', y + 6);
      badgeText.setAttribute('fill', '#07080d');
      badgeText.setAttribute('font-size', '6');
      badgeText.setAttribute('font-family', 'monospace');
      badgeText.setAttribute('font-weight', '700');
      badgeText.setAttribute('text-anchor', 'middle');
      badgeText.setAttribute('dominant-baseline', 'middle');
      badgeText.textContent = outcome === 'pass' ? '✓' : '✗';
      app(g, circle, badgeText);
    }

    app(g, rect, numText, titleText);

    g.addEventListener('click', () => {
      STATE.openStep[f.id] = i;
      renderFault(f.id);
      // Scroll to the step
      setTimeout(() => {
        const stepEl = document.getElementById('step-' + f.id + '-' + i);
        if (stepEl) stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    });

    svg.appendChild(g);
  });

  return svg;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STEP CARD BUILDER (pure DOM, no innerHTML with data)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const K_LABELS = { check:'CHECK', test:'TEST', pass:'PASS', fail:'FAIL', fix:'ACTION', danger:'CAUTION' };
const K_CLS = { check:'sb-check', test:'sb-test', fix:'sb-fix', danger:'sb-danger' };

function buildStepCard(f, s, idx) {
  const outcomes = getOutcomes(f.id);
  const outcome = outcomes[idx];
  const isOpen = STATE.openStep[f.id] === idx;

  const card = el('div', 'step' + (isOpen ? ' open' : '') + (outcome ? ' done' : ''));
  card.id = 'step-' + f.id + '-' + idx;

  // Head
  const head = el('div', 'step-head');
  const numEl = el('span', 'step-num', 'STEP ' + String(idx + 1).padStart(2,'0'));
  const badge = el('span', 'step-badge ' + (K_CLS[s.k] || 'sb-check'), K_LABELS[s.k] || s.k.toUpperCase());
  const title = el('span', 'step-title', s.title);

  app(head, numEl, badge, title);

  if (outcome) {
    const oc = el('span', outcome === 'pass' ? 'step-outcome outcome-pass' : 'step-outcome outcome-fail',
      outcome === 'pass' ? '✓ PASS' : outcome === 'fail' ? '✗ FAIL' : '— SKIP');
    head.appendChild(oc);
  }

  const chev = elH('span', 'step-chevron', SVG.chevron);
  chev.querySelector('svg').style.cssText = 'width:13px;height:13px';
  head.appendChild(chev);

  head.addEventListener('click', () => {
    STATE.openStep[f.id] = isOpen ? -1 : idx;
    renderFault(f.id);
  });
  card.appendChild(head);

  if (isOpen) {
    const body = el('div', 'step-body');

    // Description
    if (s.desc) {
      const desc = el('p', 'step-desc', s.desc);
      body.appendChild(desc);
    }

    // Measurements
    if (s.meas && s.meas.length) {
      const row = el('div', 'meas-row');
      s.meas.forEach(m => {
        const mv = el('span', 'mv ' + (m.s || ''));
        app(mv, el('span', 'mv-label', m.l + ': '), el('span', 'mv-val', m.v));
        row.appendChild(mv);
      });
      body.appendChild(row);
    }

    // Pass/Fail
    if (s.pf) {
      const grid = el('div', 'pf-grid');
      const okBox = el('div', 'pf-box ok');
      const okHd = el('div', 'pf-hd');
      const okIco = elH('span', '', SVG.check);
      okIco.querySelector('svg').style.cssText = 'width:11px;height:11px;margin-right:4px';
      app(okHd, okIco, el('span', '', 'PASS — ' + s.pf.ok.h));
      app(okBox, okHd, el('p', 'pf-txt', s.pf.ok.b));

      const badBox = el('div', 'pf-box bad');
      const badHd = el('div', 'pf-hd');
      const badIco = elH('span', '', SVG.x);
      badIco.querySelector('svg').style.cssText = 'width:11px;height:11px;margin-right:4px';
      app(badHd, badIco, el('span', '', 'FAIL — ' + s.pf.bad.h));
      app(badBox, badHd, el('p', 'pf-txt', s.pf.bad.b));

      app(grid, okBox, badBox);
      body.appendChild(grid);
    }

    // Action items
    if (s.acts && s.acts.length) {
      const actsDiv = el('div', 'acts');
      s.acts.forEach(a => {
        const act = el('div', 'act ' + (a.w || ''));
        const ico = el('span', 'act-ico', a.w === 'bad' ? '!' : a.w === 'warn' ? '▲' : '→');
        act.appendChild(ico);
        act.appendChild(el('span', 'act-txt', a.t));
        actsDiv.appendChild(act);
      });
      body.appendChild(actsDiv);
    }

    // PASS / FAIL buttons (show only if not a fix/danger step)
    if (s.k !== 'danger') {
      const btns = el('div', 'pf-btns');
      if (outcome) {
        const undo = el('button', 'btn-skip', '↩ Undo');
        undo.addEventListener('click', (e) => {
          e.stopPropagation();
          delete getOutcomes(f.id)[idx];
          renderFault(f.id);
        });
        btns.appendChild(undo);
      } else {
        const passBtn = el('button', 'btn-pass', '✓ Mark Pass');
        const failBtn = el('button', 'btn-fail', '✗ Mark Fail');
        const skipBtn = el('button', 'btn-skip', 'Skip →');
        passBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          getOutcomes(f.id)[idx] = 'pass';
          STATE.openStep[f.id] = idx + 1;
          renderFault(f.id);
          setTimeout(() => {
            const next = document.getElementById('step-' + f.id + '-' + (idx + 1));
            if (next) next.scrollIntoView({ behavior:'smooth', block:'nearest' });
          }, 80);
        });
        failBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          getOutcomes(f.id)[idx] = 'fail';
          STATE.openStep[f.id] = idx + 1;
          renderFault(f.id);
          setTimeout(() => {
            const next = document.getElementById('step-' + f.id + '-' + (idx + 1));
            if (next) next.scrollIntoView({ behavior:'smooth', block:'nearest' });
          }, 80);
        });
        skipBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          getOutcomes(f.id)[idx] = 'skip';
          STATE.openStep[f.id] = idx + 1;
          renderFault(f.id);
        });
        app(btns, passBtn, failBtn, skipBtn);
      }
      body.appendChild(btns);
    }

    card.appendChild(body);
  }

  return card;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDER FAULT PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderFault(fid) {
  const f = DB.find(x => x.id === fid);
  if (!f) { renderHome(); return; }

  // Ensure open step is initialized
  if (STATE.openStep[f.id] === undefined) STATE.openStep[f.id] = 0;

  const outcomes = getOutcomes(f.id);
  const doneCount = Object.keys(outcomes).length;
  const pct = Math.round(doneCount / f.steps.length * 100);

  const main = $('mainArea');
  main.innerHTML = '';
  main.classList.add('fade');
  setTimeout(() => main.classList.remove('fade'), 350);

  // ── HERO ──
  const hero = el('div', 'hero');
  const heroRow = el('div', 'hero-row');
  const heroIco = elH('div', 'hero-ico', SVG[f.icon] || SVG.power);
  heroIco.querySelector('svg').style.cssText = 'width:22px;height:22px;color:#07080d';
  const heroTxt = el('div', '');
  app(heroTxt,
    el('div', 'hero-cat', f.cat + ' · diagnostic fault tree'),
    el('h1', 'hero-title', f.title),
    el('p', 'hero-sub', f.sub)
  );
  app(heroRow, heroIco, heroTxt);

  const pills = el('div', 'hero-pills');
  const mkPill = (svg, label, val) => {
    const p = el('span', 'pill');
    const ico = elH('span', '', svg);
    ico.querySelector('svg').style.cssText = 'width:10px;height:10px;color:var(--a)';
    app(p, ico, el('span', '', label + ' '), el('b', '', String(val)));
    return p;
  };
  app(pills,
    mkPill(SVG.boot, 'Steps', f.steps.length),
    mkPill(SVG.dmm, 'Tests', f.steps.filter(s=>s.k==='test').length),
    mkPill(SVG.scope, 'Lines', (f.lines||[]).length),
    mkPill(SVG.micro, 'ICs', (f.ics||[]).length),
    mkPill(SVG.check, 'Completed', doneCount + '/' + f.steps.length)
  );
  app(hero, heroRow, pills);
  main.appendChild(hero);

  // ── CONTENT ──
  const content = el('div', 'content');

  // Progress bar
  const pbWrap = el('div', 'progress-bar');
  const pbFill = el('div', 'progress-fill');
  pbFill.style.width = pct + '%';
  pbWrap.appendChild(pbFill);
  content.appendChild(pbWrap);

  // Summary
  const sumSec = el('div', 'sec');
  const sumHead = el('div', 'sec-head');
  app(sumHead, el('span', 'sec-line'), el('span', 'sec-title', 'Technical Overview'));
  app(sumSec, sumHead, el('div', 'summary', f.summary));
  content.appendChild(sumSec);

  // Tools
  const toolsSec = el('div', 'sec');
  const toolsHead = el('div', 'sec-head');
  app(toolsHead, el('span', 'sec-line'), el('span', 'sec-title', 'Required Tools'));
  const toolsRow = el('div', 'tools-row');
  (f.tools || []).forEach(tid => {
    const tm = TOOLS[tid] || {n:tid, s:'', i:'dmm'};
    const chip = el('div', 'tool');
    const ico = elH('div', 'tool-ico', SVG[tm.i] || SVG.dmm);
    ico.querySelector('svg').style.cssText = 'width:12px;height:12px';
    const txt = el('div', '');
    app(txt, el('div', 'tool-n', tm.n), el('div', 'tool-s', tm.s));
    app(chip, ico, txt);
    toolsRow.appendChild(chip);
  });
  app(toolsSec, toolsHead, toolsRow);
  content.appendChild(toolsSec);

  // ── REAL-TIME DIAGNOSTIC MAP ──
  const mapSec = el('div', 'sec');
  const mapHead = el('div', 'sec-head');
  const mapCt = el('span', 'sec-ct', 'Click node to jump · Mark PASS/FAIL to track progress');
  app(mapHead, el('span', 'sec-line'), el('span', 'sec-title', 'Real-Time Diagnostic Map'), mapCt);

  const mapWrap = el('div', 'map-wrap');
  const mapScroll = el('div', 'map-scroll');
  mapScroll.appendChild(buildMap(f));
  mapWrap.appendChild(mapScroll);
  app(mapSec, mapHead, mapWrap);
  content.appendChild(mapSec);

  // ── STEP CARDS ──
  const stepsSec = el('div', 'sec');
  const stepsHead = el('div', 'sec-head');
  const stepsCt = el('span', 'sec-ct', 'Step in order · ' + f.steps.length + ' steps');
  app(stepsHead, el('span', 'sec-line'), el('span', 'sec-title', 'Diagnostic Branch Tree'), stepsCt);
  const stepsDiv = el('div', 'steps');

  f.steps.forEach((s, i) => {
    stepsDiv.appendChild(buildStepCard(f, s, i));
  });

  // Reset progress button
  if (doneCount > 0) {
    const resetBtn = el('button', 'btn-skip', '↺ Reset progress for this fault');
    resetBtn.style.cssText = 'margin-top:12px;display:block';
    resetBtn.addEventListener('click', () => {
      STATE.outcomes[f.id] = {};
      STATE.openStep[f.id] = 0;
      renderFault(f.id);
    });
    stepsDiv.appendChild(resetBtn);
  }

  app(stepsSec, stepsHead, stepsDiv);
  content.appendChild(stepsSec);

  // ── SIGNAL LINES ──
  if (f.lines && f.lines.length) {
    const linesSec = el('div', 'sec');
    const linesHead = el('div', 'sec-head');
    const linesCt = el('span', 'sec-ct', f.lines.length + ' nets');
    app(linesHead, el('span', 'sec-line'), el('span', 'sec-title', 'Signal Lines & Test Points'), linesCt);
    const linesWrap = el('div', 'lines-wrap');
    const tbl = el('table', 'lines-tbl');
    f.lines.forEach(l => {
      const tr = el('tr', '');
      const tdNet = el('td', 'td-net', l.net);
      const tdDir = el('td', 'td-dir', l.dir);
      const tdNom = el('div', '');
      tdNom.appendChild(el('div', 'td-nom', l.nom));
      tdNom.appendChild(el('div', '', l.note));
      tdNom.lastChild.style.cssText = 'color:var(--ink3);font-size:11px;margin-top:2px';
      const tdCell = el('td', '');
      tdCell.appendChild(tdNom);
      app(tr, tdNet, tdDir, tdCell);
      tbl.appendChild(tr);
    });
    linesWrap.appendChild(tbl);
    app(linesSec, linesHead, linesWrap);
    content.appendChild(linesSec);
  }

  // ── SUSPECT ICs ──
  if (f.ics && f.ics.length) {
    const icSec = el('div', 'sec');
    const icHead = el('div', 'sec-head');
    const icCt = el('span', 'sec-ct', f.ics.length + ' parts');
    app(icHead, el('span', 'sec-line'), el('span', 'sec-title', 'Suspect ICs & Components'), icCt);
    const icGrid = el('div', 'ic-grid');
    f.ics.forEach(ic => {
      const card = el('div', 'ic-card');
      app(card,
        el('div', 'ic-name', ic.name),
        el('div', 'ic-aka', ic.aka),
        el('div', 'ic-desc', ic.desc)
      );
      icGrid.appendChild(card);
    });
    app(icSec, icHead, icGrid);
    content.appendChild(icSec);
  }

  // ── VERIFY ──
  if (f.verify && f.verify.length) {
    const vSec = el('div', 'sec');
    const vHead = el('div', 'sec-head');
    app(vHead, el('span', 'sec-line'), el('span', 'sec-title', 'Verification Checklist'));
    const vBlock = el('div', 'verify');
    vBlock.appendChild(el('div', 'verify-hd', '✓ Before handing back to customer'));
    const vList = el('ul', 'verify-list');
    f.verify.forEach(v => { const li = el('li', '', v); vList.appendChild(li); });
    vBlock.appendChild(vList);
    app(vSec, vHead, vBlock);
    content.appendChild(vSec);
  }

  // ── MISTAKES ──
  if (f.mistakes && f.mistakes.length) {
    const mSec = el('div', 'sec');
    const mHead = el('div', 'sec-head');
    const mCt = el('span', 'sec-ct', 'Avoid these');
    app(mHead, el('span', 'sec-line'), el('span', 'sec-title', 'Common Mistakes'), mCt);
    const mList = el('div', 'mistakes');
    f.mistakes.forEach(m => {
      const row = el('div', 'mistake');
      const emo = el('div', 'mistake-e', m.e);
      const txt = el('div', '');
      app(txt, el('div', 'mistake-t', m.t), el('div', 'mistake-d', m.d));
      app(row, emo, txt);
      mList.appendChild(row);
    });
    app(mSec, mHead, mList);
    content.appendChild(mSec);
  }

  main.appendChild(content);

  // Footer
  const foot = el('div', 'footer');
  foot.appendChild(el('span', '', 'Fault ID: ' + f.id + ' · ' + f.steps.length + ' steps'));
  foot.appendChild(el('span', '', 'Verify on known-good board · ESD precautions always'));
  main.appendChild(foot);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME PAGE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderHome() {
  const totalSteps = DB.reduce((a,f) => a + f.steps.length, 0);
  const totalLines = DB.reduce((a,f) => a + (f.lines||[]).length, 0);
  const totalICs   = DB.reduce((a,f) => a + (f.ics||[]).length, 0);

  const main = $('mainArea');
  main.innerHTML = '';
  main.classList.add('fade');
  setTimeout(() => main.classList.remove('fade'), 350);

  const home = el('div', 'home');

  app(home,
    el('div', 'home-hi', 'Technician diagnostic atlas · full branch logic · offline'),
    el('h1', 'home-h', 'Fix any smartphone,\nstep by step.'),
    el('p', 'home-lede', 'Real measurement values, PASS/FAIL branch logic, interactive diagnostic map, suspect IC references, signal line specs, and verified repair actions — for every major smartphone failure mode.')
  );

  const stats = el('div', 'stats-row');
  const mkStat = (n, l) => {
    const s = el('div', 'stat');
    app(s, el('div', 'stat-n', String(n)), el('div', 'stat-l', l));
    return s;
  };
  app(stats,
    mkStat(DB.length, 'Fault Trees'),
    mkStat(totalSteps, 'Diagnostic Steps'),
    mkStat(totalLines, 'Signal Lines'),
    mkStat(totalICs, 'IC References')
  );
  home.appendChild(stats);

  const quick = el('div', 'quick');
  DB.forEach(f => {
    const btn = el('button', 'qbtn');
    const ico = elH('div', 'qbtn-ico', SVG[f.icon] || SVG.power);
    ico.querySelector('svg').style.cssText = 'width:14px;height:14px';
    app(btn, ico, el('div', 'qbtn-t', f.title.split('/')[0].split('—')[0].trim()), el('div', 'qbtn-d', f.sub));
    btn.addEventListener('click', () => { STATE.cur = f.id; refresh(); });
    quick.appendChild(btn);
  });
  home.appendChild(quick);
  main.appendChild(home);

  const foot = el('div', 'footer');
  foot.appendChild(el('span', '', 'FaultMap Pro v5.1 · Fully offline · No dependencies'));
  foot.appendChild(el('span', '', 'Always work anti-static · disconnect battery before BGA rework'));
  main.appendChild(foot);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDER CONTROLLER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function refresh() {
  buildSidebar();
  if (STATE.cur) renderFault(STATE.cur);
  else renderHome();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EVENTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
$('srch').addEventListener('input', e => { STATE.q = e.target.value; buildSidebar(); });
$('menuBtn').addEventListener('click', () => {
  $('side').classList.toggle('open');
  $('bdrop').classList.toggle('on');
});
$('bdrop').addEventListener('click', () => {
  $('side').classList.remove('open');
  $('bdrop').classList.remove('on');
});

/* Initial render */
refresh();
</script>
</body>
</html>
